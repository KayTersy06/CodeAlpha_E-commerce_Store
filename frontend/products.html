<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products | Coach Tersy</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="index.html" class="brand">Coach Tersy</a>
        <button class="menu-toggle" aria-label="Toggle menu">☰</button>
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="products.html" class="active">Products</a>
          <a href="categories.html">Categories</a>
          <a href="cart.html">Cart</a>
          <a href="login.html" id="authLink">Login</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <div class="page-header">
        <div>
          <p class="eyebrow">Shop wellness essentials</p>
          <h1>Our Products</h1>
        </div>
      </div>

      <div class="filters card">
        <input id="searchInput" type="search" placeholder="Search products..." />
        <select id="categoryFilter">
          <option value="">All categories</option>
        </select>
        <select id="sortFilter">
          <option value="">Sort by</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
        </select>
      </div>

      <div id="productsLoader" class="loader">Loading products...</div>
      <div id="productsGrid" class="product-grid"></div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
  </body>
</html>
