<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Categories | Coach Tersy</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="dashboard.html" class="brand">Coach Tersy Admin</a>
        <nav class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="products.html">Manage Products</a>
          <a href="categories.html" class="active">Manage Categories</a>
          <a href="orders.html">Manage Orders</a>
          <a href="#" id="logoutAdmin">Logout</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <div class="page-header">
        <div>
          <p class="eyebrow">Catalog control</p>
          <h1>Manage Categories</h1>
        </div>
      </div>
      <form id="categoryForm" class="card form-card">
        <h3>Add or edit category</h3>
        <input type="hidden" id="categoryId" />
        <input type="text" id="categoryName" placeholder="Category name" required />
        <button type="submit" class="btn btn-primary">Save Category</button>
      </form>
      <div id="adminCategories" class="table-card"></div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
