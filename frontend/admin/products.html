<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Products | Coach Tersy</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="dashboard.html" class="brand">Coach Tersy Admin</a>
        <nav class="nav-links">
          <a href="dashboard.html">Dashboard</a>
          <a href="products.html" class="active">Manage Products</a>
          <a href="categories.html">Manage Categories</a>
          <a href="orders.html">Manage Orders</a>
          <a href="#" id="logoutAdmin">Logout</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <div class="page-header">
        <div>
          <p class="eyebrow">Inventory control</p>
          <h1>Manage Products</h1>
        </div>
      </div>
      <form id="productForm" class="card form-card">
        <h3>Add or edit product</h3>
        <input type="hidden" id="productId" />
        <input type="text" id="productName" placeholder="Product name" required />
        <input type="number" id="productPrice" placeholder="Price" step="0.01" required />
        <input type="number" id="productStock" placeholder="Stock" required />
        <input type="text" id="productImage" placeholder="Image URL" />
        <select id="productCategory" required>
          <option value="">Select category</option>
        </select>
        <textarea id="productDescription" placeholder="Description"></textarea>
        <textarea id="productBenefits" placeholder="Benefits"></textarea>
        <button type="submit" class="btn btn-primary">Save Product</button>
      </form>
      <div id="adminProducts" class="table-card"></div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
