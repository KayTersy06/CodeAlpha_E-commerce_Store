<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Coach Tersy</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="index.html" class="brand">Coach Tersy</a>
        <button class="menu-toggle" aria-label="Toggle menu">☰</button>
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="categories.html">Categories</a>
          <a href="cart.html">Cart</a>
          <a href="login.html" class="active">Login</a>
        </nav>
      </div>
    </header>

    <main class="container page auth-page">
      <form id="loginForm" class="card form-card">
        <h1>Welcome back</h1>
        <p>Sign in to continue your wellness journey.</p>
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit" class="btn btn-primary">Login</button>
        <p class="muted">Need an account? <a href="register.html">Register</a></p>
        <div id="loginMessage" class="message"></div>
      </form>
    </main>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
