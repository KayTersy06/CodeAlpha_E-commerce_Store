<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Coach Tersy</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-bar">
        <a href="index.html" class="brand">Coach Tersy</a>
        <button class="menu-toggle" aria-label="Toggle menu">☰</button>
        <nav class="nav-links">
          <a href="index.html">Home</a>
          <a href="products.html">Products</a>
          <a href="categories.html">Categories</a>
          <a href="cart.html">Cart</a>
          <a href="login.html" id="authLink">Login</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <div class="page-header">
        <div>
          <p class="eyebrow">Complete your order</p>
          <h1>Checkout</h1>
        </div>
      </div>
      <div class="checkout-grid">
        <form id="checkoutForm" class="card form-card">
          <h3>Delivery details</h3>
          <input type="text" id="fullName" placeholder="Full name" required />
          <input type="email" id="email" placeholder="Email" required />
          <input type="tel" id="phone" placeholder="Phone number" required />
          <textarea id="address" placeholder="Delivery address" required></textarea>
          <button type="submit" class="btn btn-primary">Place Order</button>
          <div id="checkoutMessage" class="message"></div>
        </form>
        <aside id="checkoutSummary" class="card summary-card"></aside>
      </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
